services:
  # ==========================================
  # TEST ENVIRONMENT (replaces bazaar-react-server-dev on port 5050)
  # ==========================================
  api-test:
    build:
      context: .
      target: prod
    ports:
      - "0.0.0.0:5050:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./temp:/app/temp
    env_file:
      - .env.test
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - app-network

  # ==========================================
  # PRODUCTION (replaces bazaar-react-server-prod on port 5051)
  # ==========================================
  api-prod:
    build:
      context: .
      target: prod
    ports:
      - "127.0.0.1:5051:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./temp:/app/temp
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  # ==========================================
  # CRON WORKER (production only — product sync + notifications)
  # ==========================================
  cron:
    build:
      context: .
      target: prod
    command: ["node", "src/scripts/cronWorker.js"]
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - api-prod
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
