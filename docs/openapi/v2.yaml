                        $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /user/tabby-buyer-history:
    get:
      operationId: userGetTabbyBuyerHistory
      tags: [User]
      summary: Get Tabby BNPL purchase history (mobile)
      description: |
        Returns the user's Tabby buy-now-pay-later transaction history.
        **Mobile-only**.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      responses:
        '200':
          description: Tabby history list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /user/current-month-categories:
    get:
      operationId: userGetCurrentMonthCategories
      tags: [User]
      summary: Get categories ordered in the current month (web)
      description: |
        Returns a breakdown of categories the user has ordered from
        in the current calendar month. Used for personalisation on the web dashboard.
        **Web-only**.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientWeb'
      responses:
        '200':
          description: Category breakdown.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            category:
                              type: string
                            count:
                              type: integer
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Wishlist — shared (both platforms)
  # ════════════════════════════════════════════════════════════════════════════

  /wishlist:
    get:
      operationId: wishlistGet
      tags: [Wishlist]
      summary: Get the current user's wishlist
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Wishlist items.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Wishlist'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

    post:
      operationId: wishlistAdd
      tags: [Wishlist]
      summary: Add a product to the wishlist
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistRequest'
      responses:
        '200':
          description: Product added — full wishlist returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Wishlist'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500Internal'

    delete:
      operationId: wishlistRemove
      tags: [Wishlist]
      summary: Remove a product from the wishlist
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistRequest'
      responses:
        '200':
          description: Product removed — full wishlist returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Wishlist'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

# ─────────────────────────────────────────────────────────────────────────────
# Reusable Parameters
# ─────────────────────────────────────────────────────────────────────────────
  parameters:

    XClient:
      in: header
      name: X-Client
      required: true
      schema:
        type: string
        enum: [web, mobile]
      description: >
        Platform identifier. Routes behave differently per platform.
        Missing or invalid value → 400 `UNKNOWN_PLATFORM`.

    XClientMobile:
      in: header
      name: X-Client
      required: true
      schema:
        type: string
        enum: [mobile]
      description: This endpoint is **mobile-only**. Must be `mobile`.

    XClientWeb:
      in: header
      name: X-Client
      required: true
      schema:
        type: string
        enum: [web]
      description: This endpoint is **web-only**. Must be `web`.

    AddressId:
      in: path
      name: addressId
      required: true
      schema:
        type: string
      description: MongoDB ObjectId of the address document.
