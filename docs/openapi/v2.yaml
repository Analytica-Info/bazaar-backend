    delete:
      operationId: meDeleteMe
      tags: [Auth]
      summary: Delete (soft-delete) the current user's account
      description: |
        Schedules the account for deletion.
        Recoverable for 30 days, then permanently removed.
        Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Account deletion scheduled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          scheduledFor:
                            type: string
                            format: date-time
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '500':
          $ref: '#/components/responses/500Internal'

  # ── Mobile-only auth ─────────────────────────────────────────────────────

  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [Auth]
      summary: Rotate refresh token (mobile)
      description: |
        Exchanges a valid refresh token for a new access + refresh token pair.
        **Mobile-only** — web clients receive tokens via cookies.
        Rate limit: 60 / family / hour.
        Implements reuse detection: using a retired refresh token revokes the entire family.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '429':
          $ref: '#/components/responses/429RateLimited'
        '500':
          $ref: '#/components/responses/500Internal'

  /auth/session:
    get:
      operationId: authGetSession
      tags: [Auth]
      summary: Validate current session (both platforms)
      description: |
        Web: verifies the cookie session (reads `user_token` cookie).
        Mobile: verifies the access token passed in the `Authorization` header.
        Unified across platforms — replaces `GET /auth/check` (web) and
        `POST /auth/check-access-token` (mobile).
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Session status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          authenticated:
                            type: boolean
                          valid:
                            type: boolean
                            description: Mobile alias for authenticated.
                          user:
                            $ref: '#/components/schemas/User'
                            nullable: true
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  # ── Web-only auth ────────────────────────────────────────────────────────

  /auth/logout:
    post:
      operationId: authLogout
      tags: [Auth]
      summary: Log out — revoke current session (web)
      description: |
        Revokes the current refresh token family and clears session cookies.
        **Web-only** — mobile clients should discard tokens locally.
        Rate limit: 30 / account / hour.
        Idempotent: already-revoked sessions still return success.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientWeb'
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean
                            example: true
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Cart — both platforms
  # ════════════════════════════════════════════════════════════════════════════

  /cart:
    get:
      operationId: cartGet
      tags: [Cart]
      summary: Get the current user's cart
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Cart contents.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /cart/items:
    post:
      operationId: cartAddItem
      tags: [Cart]
      summary: Add an item to the cart
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        '200':
          description: Item added — full cart returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /cart/items/{productId}:
    delete:
      operationId: cartRemoveItem
      tags: [Cart]
      summary: Remove an item from the cart
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: productId
          required: true
          schema:
            type: string
          description: Product ID to remove from cart.
      responses:
        '200':
          description: Item removed — full cart returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'
    patch:
      operationId: cartUpdateItemQuantity
      tags: [Cart]
      summary: Increase or decrease item quantity by delta
      description: |
        Positive `delta` increases quantity; negative `delta` decreases it.
        `delta === 0` or missing is a 400. `abs(delta)` is capped at 100.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delta]
              properties:
                delta:
                  type: integer
                  example: 1
                  description: Positive to increase, negative to decrease. Max abs value 100.
      responses:
        '200':
          description: Quantity updated — full cart returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Notifications — mobile has track-click; web does not
  # ════════════════════════════════════════════════════════════════════════════

  /notifications:
    get:
      operationId: notificationsGet
      tags: [Notifications]
      summary: List in-app notifications (paginated)
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated notification list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'
    patch:
      operationId: notificationsUpdateReadState
      tags: [Notifications]
      summary: Mark notifications as read (bulk PATCH)
      description: |
        Marks specific notifications (by `ids`) or all unread notifications as read.
        Body: `{ read: true, ids?: string[] }`.
        If `ids` is omitted or empty, all unread notifications for the user are marked read.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [read]
              properties:
                read:
                  type: boolean
                  example: true
                ids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
                  description: Specific notification IDs to mark. Omit to mark all unread.
      responses:
        '200':
          description: Notifications marked as read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /notifications/{id}/clicks:
    post:
      operationId: notificationsRecordClick
      tags: [Notifications]
      summary: Record a notification click (mobile)
      description: |
        Records that the user tapped a specific push notification.
        **Mobile-only**. The notification ID is now a URL segment.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Notification ID.
      responses:
        '200':
          description: Click recorded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tracked:
                            type: boolean
                            example: true
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

  /notifications/subscriptions:
    post:
      operationId: notificationsSubscribe
      tags: [Notifications]
      summary: Subscribe to a coming-soon vertical launch notification
      description: |
        Records a launch-notification subscription for a specific vertical.
        Upserts by (email, vertical) — idempotent.

        **Auth required (2026-05-19):** the subscriber email is sourced from
        the authenticated user's JWT (`req.user.email`); any client-supplied
        `email` field in the request body is ignored. Unauthenticated callers
        receive `401 UNAUTHORIZED`. The new row also stores the authenticated
        `user_id` for downstream launch-comms join-back to the users collection.

        (Previously POST /notify-me — Wave 3 rename.)
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vertical]
              properties:
                vertical:
                  type: string
                  enum: [auction, marketplace, wholesale, home]
                pushOptIn:
                  type: boolean
                  default: true
                deviceId:
                  type: string
                  nullable: true
                  description: Optional FCM token for push notifications.
      responses:
        '200':
          description: Subscribed (or already subscribed).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          alreadySubscribed:
                            type: boolean
        '400':
          $ref: '#/components/responses/400ValidationError'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Orders — mobile has checkout flows; web has address + validate only
  # ════════════════════════════════════════════════════════════════════════════

  /orders:
    get:
      operationId: ordersGetList
      tags: [Orders]
      summary: List orders for the current user (both platforms)
      description: |
        Returns a paginated list of the authenticated user's orders.
        Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated order list.
          content:
            application/json:
              schema:
                allOf:
