            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InventoryValidationResult'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/checkouts/stripe:
    post:
      operationId: ordersCreateStripeCheckout
      tags: [Orders]
      summary: Create a Stripe checkout session (mobile)
      description: |
        Creates a Stripe hosted checkout session and returns the redirect URL.
        **Mobile-only**.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutStripeRequest'
      responses:
        '200':
          description: Checkout session created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckoutSession'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/checkouts/tabby:
    post:
      operationId: ordersCreateTabbyCheckout
      tags: [Orders]
      summary: Create a Tabby BNPL checkout session (mobile)
      description: |
        Creates a Tabby buy-now-pay-later checkout session.
        **Mobile-only**.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutTabbyRequest'
      responses:
        '200':
          description: Tabby checkout URL returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckoutSession'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/checkouts/tabby/verify:
    post:
      operationId: ordersVerifyTabbyCheckout
      tags: [Orders]
      summary: Verify Tabby payment status (mobile)
      description: |
        Called after the user returns from the Tabby payment page.
        **Mobile-only**. Reads `paymentId` from the request body.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentId]
              properties:
                paymentId:
                  type: string
                  description: Tabby payment ID returned by the checkout session.
      responses:
        '200':
          description: Payment verification result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          finalStatus:
                            type: string
                            example: authorized
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/checkouts/nomod:
    post:
      operationId: ordersCreateNomodCheckout
      tags: [Orders]
      summary: Create a Nomod checkout session (mobile + web)
      description: |
        Creates a Nomod payment checkout session.
        Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutNomodRequest'
      responses:
        '200':
          description: Nomod checkout URL returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          paymentId:    { type: string }
                          checkoutId:   { type: string, description: 'Alias for paymentId — Nomod uses one identifier as both.' }
                          checkoutUrl:  { type: string, format: uri, description: 'Hosted Nomod checkout URL. Open this in the mobile WebView.' }
                          status:       { type: string, example: 'created' }
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/checkouts/nomod/verify:
    post:
      operationId: ordersVerifyNomodCheckout
      tags: [Orders]
      summary: Verify Nomod payment and create order (mobile + web)
      description: |
        Called after the user returns from the Nomod payment page.
        Available on **both** mobile and web clients. Reads `paymentId` from the request body.
        On success creates the order and returns the new `orderId`. Returns
        `orderId: null` with message `"Order already created"` if the payment was
        already processed (dedup).
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentId]
              properties:
                paymentId:
                  type: string
                  description: Nomod checkout/payment ID returned by the checkout session.
      responses:
        '200':
          description: Payment verified and order created (or already existed).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          orderId:
                            type: string
                            nullable: true
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/checkouts/stripe/init:
    post:
      operationId: ordersInitStripeCheckout
      tags: [Orders]
      summary: Initialise a Stripe PaymentIntent (mobile)
      description: |
        Creates a Stripe PaymentIntent and returns the `clientSecret` for use with
        the Stripe Elements SDK on the client.
        **Mobile-only**.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StripeInitRequest'
      responses:
        '200':
          description: PaymentIntent client secret.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          clientSecret:
                            type: string
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /payment-methods:
    get:
      operationId: listPaymentMethods
      tags: [Orders]
      summary: List available payment methods (mobile)
      description: |
        Returns the payment methods available to the current user.
        **Mobile-only**.

        > **NOTE** — the `enabled` flag on each payment method is a runtime-toggleable value,
        > not a static constant.  Ops can flip individual providers on/off without a redeploy
        > via `PUT /v2/admin/payment-method-config`.  Env-var hard gates (e.g. `TABBY_AUTH_KEY`)
        > still control whether a provider appears in the list at all.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
      responses:
        '200':
          description: Payment methods list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            enabled:
                              type: boolean
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /me/addresses:
    get:
      operationId: meListAddresses
      tags: [Orders]
      summary: List saved delivery addresses
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Address list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

    post:
      operationId: meCreateAddress
      tags: [Orders]
      summary: Save a new delivery address
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '200':
          description: Address saved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /me/addresses/{id}:
    delete:
      operationId: meDeleteAddress
      tags: [Orders]
      summary: Delete a saved address
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          addresses:
                            type: array
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'
    patch:
      operationId: meUpdateAddress
      tags: [Orders]
      summary: Partially update an address
      description: |
        Available on **both** mobile and web clients.
        Body is a partial patch — any subset of address fields plus the
        optional `primary` flag. Absent fields are left untouched. Unknown
        keys are silently ignored.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:         { type: string }
                email:        { type: string }
                mobile:       { type: string }
                city:         { type: string }
                area:         { type: string }
                state:        { type: string }
                country:      { type: string }
                countryCode:  { type: string }
                floorNo:      { type: string }
                apartmentNo:  { type: string }
                buildingName: { type: string }
                landmark:     { type: string }
                primary:
                  type: boolean
                  description: Set true to mark this address as the primary; false to clear.
      responses:
        '200':
          description: Address updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/{id}/proof-of-delivery:
    post:
      operationId: ordersUploadProofOfDelivery
      tags: [Orders]
      summary: Upload proof-of-delivery image (mobile)
      description: |
        File-upload route for attaching a proof-of-delivery image to an order.
        **Mobile-only**. Send as multipart/form-data with a `file` field.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClientMobile'
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Proof-of-delivery image (jpeg, jpg, png).
                status:
                  type: string
                  description: Optional status to set alongside the upload.
      responses:
        '200':
          description: Proof uploaded and order updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Home manifest — single ETag-cached round-trip replacing 8–10 parallel reqs
  # ════════════════════════════════════════════════════════════════════════════

  /home:
    get:
      operationId: homeGetManifest
      tags: [Home]
      summary: Home screen manifest
      description: >
        Returns all home-screen rails in a single cacheable response.
        Supports `If-None-Match` / ETag conditional GETs for 304 Not Modified.
      parameters:
        - name: rails
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of rail names to include. Defaults to all enabled for the platform.
        - name: params
          in: query
          required: false
          schema:
            type: string
          description: JSON-encoded per-rail param overrides, e.g. `{"new-arrivals":{"limit":20}}`.
      responses:
        '200':
          description: Home manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeManifestResponse'
        '304':
          description: Not Modified — client cache is still valid
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Products — shared (both platforms, no auth required for most)
  # ════════════════════════════════════════════════════════════════════════════

  /categories:
    get:
      operationId: categoriesList
      tags: [Products]
      summary: List categories (or search by name)
      description: |
        Returns the full category tree.  If the `q` query param is present,
        searches categories by name instead.  Public — no auth required.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: query
          name: q
          schema:
            type: string
          description: Optional search term — if present, returns matching categories only.
      responses:
        '200':
          description: Category list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/400ValidationError'
        '500':
          $ref: '#/components/responses/500Internal'

  /products:
    get:
      operationId: productsGetList
      tags: [Products]
      summary: List products with optional filtering
      description: Public — no auth required.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category ID.
        - in: query
          name: sort
          schema:
            type: string
            enum: [price_asc, price_desc, newest, popular]
      responses:
        '200':
          description: Paginated product list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '500':
          $ref: '#/components/responses/500Internal'

  /products/{id}:
    get:
      operationId: productsGetDetail
      tags: [Products]
      summary: Get product detail
      description: |
        Returns full product details including variants.
        Accepts an optional bearer / cookie token to decorate the `inWishlist` flag.
      security:
        - {}
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

  /products/search:
    post:
      operationId: productsSearch
      tags: [Products]
      summary: Full-text product search
      description: Public — no auth required.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSearchRequest'
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /categories/{id}/products:
    get:
      operationId: categoriesGetProducts
      tags: [Products]
      summary: List products in a category (unified depth handler)
      description: |
        Returns products for the given category at the requested depth:
        - `depth=1` (default) — direct category products
        - `depth=2` — sub-category products
        - `depth=3` — sub-sub-category products

        Public — no auth required.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: depth
          schema:
            type: integer
            enum: [1, 2, 3]
            default: 1
          description: Category depth (1=category, 2=sub-category, 3=sub-sub-category).
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Products in category.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
