            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

  /me/payments:
    get:
      operationId: meGetPayments
      tags: [User]
      summary: List payment history
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated payment history.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentRecord'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /me/payments/{id}:
    get:
      operationId: meGetPayment
      tags: [User]
      summary: Get a single payment record
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
