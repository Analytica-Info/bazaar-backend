                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

  /orders/inventory-checks:
    post:
      operationId: ordersCreateInventoryCheck
      tags: [Orders]
      summary: Check stock availability before checkout
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
