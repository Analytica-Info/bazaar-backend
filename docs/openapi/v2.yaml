  # ════════════════════════════════════════════════════════════════════════════
  # Coupons — shared (mobile + web), auth optional
  # ════════════════════════════════════════════════════════════════════════════

  /coupons/issuance-count:
    get:
      operationId: couponsGetIssuanceCount
      tags: [Coupons]
      summary: Get coupon issuance count
      description: |
        Returns coupon count and availability information for the caller.
        Auth is **optional** — anonymous callers receive the same response.
      security:
        - bearerAuth: []
        - cookieAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Coupon metadata fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer
                            minimum: 0
                            description: Total number of coupons available system-wide.
        '500':
          $ref: '#/components/responses/500Internal'

  /coupons/validate:
    post:
      operationId: couponsValidate
      tags: [Coupons]
      summary: Validate a coupon code (v2 engine — structured reasons)
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                phone:
                  type: string
                cart_snapshot:
                  type: object
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '500':
          $ref: '#/components/responses/500Internal'

  /coupons/apply:
    post:
      operationId: couponsV2Apply
      tags: [Coupons]
      summary: Apply (reserve) a coupon atomically
      description: Auth is **required** — anonymous callers receive 401.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, phone]
              properties:
                code:
                  type: string
                phone:
                  type: string
                cart_snapshot:
                  type: object
                idempotency_key:
                  type: string
      responses:
        '200':
          description: Reservation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '500':
          $ref: '#/components/responses/500Internal'

  /coupons/release:
    post:
      operationId: couponsV2Release
      tags: [Coupons]
      summary: Release a coupon reservation
      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [redemption_id]
              properties:
                redemption_id:
                  type: string
      responses:
        '200':
          description: Release result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500Internal'

  /coupons/redeem:
    post:
      operationId: couponsRedeem
      tags: [Coupons]
      summary: Confirm a coupon redemption against a placed order
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [redemption_id, final_cart]
              properties:
                redemption_id:
                  type: string
                order_id:
                  type: string
                final_cart:
                  type: object
      responses:
        '200':
          description: Redemption confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '409':
          description: Cart changed — stale reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/500Internal'

  /coupons/eligible:
    get:
