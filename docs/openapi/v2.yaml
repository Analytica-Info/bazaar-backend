        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                file:
                  type: string
                  format: binary
                  description: Avatar image (jpeg, jpg, png, pdf).
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '500':
          $ref: '#/components/responses/500Internal'

    get:
      operationId: meGetMe
      tags: [Auth]
      summary: Get current authenticated user
      description: |
        Returns the full profile of the authenticated user.
        Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: User data returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
