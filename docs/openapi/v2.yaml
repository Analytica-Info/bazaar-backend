      security:
        - bearerAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: query
          name: phone
          schema:
            type: string
        - in: query
          name: subtotal
          schema:
            type: number
        - in: query
          name: vertical
          schema:
            type: string
      responses:
        '200':
          description: List of eligible coupons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '500':
          $ref: '#/components/responses/500Internal'

  # ════════════════════════════════════════════════════════════════════════════
  # Rails — shared (mobile + web), auth optional
  # ════════════════════════════════════════════════════════════════════════════

  /rails/{railName}:
    get:
      operationId: railsGet
      tags: [Rails]
      summary: Fetch a paginated smart-category rail
      description: |
        Returns page N of any registered home rail.
        Rail names: `new-arrivals`, `flash-sales`, `today-deal`, `trending`,
        `favourites-of-week`, `top-rated`, `hot-offers`, `categories-product`,
        `categories`.

        **Note:** `today-deal`, `top-rated`, `favourites-of-week`, and `categories`
        use fixed-result fetchers — `page`/`limit` overrides are accepted but have
        no effect for those rails.

        Auth is **optional**.
      security:
        - bearerAuth: []
        - cookieAuth: []
        - {}
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: railName
          required: true
          schema:
            type: string
            enum:
              - new-arrivals
              - flash-sales
              - today-deal
              - trending
              - favourites-of-week
              - top-rated
              - hot-offers
              - categories-product
              - categories
          description: Registered rail identifier.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: categoryId
          schema:
            type: string
          description: Required for the `categories-product` rail. Ignored by other rails.
      responses:
        '200':
          description: Rail data fetched successfully.
          headers:
            Cache-Control:
              schema:
                type: string
              description: "`public, max-age=60, stale-while-revalidate=300`"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          railName:
                            type: string
                          page:
                            type: integer
                          limit:
                            type: integer
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500Internal'

  # /products/categories/search merged into GET /categories?q=:term (Wave 3)

  /products/{id}/reviews:
    get:
      operationId: productReviewsList
      tags: [Products]
      summary: List reviews for a product
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          productId: { type: string }
                          total: { type: integer }
                          reviews: { type: array, items: { type: object } }
        '500': { $ref: '#/components/responses/500Internal' }
    post:
      operationId: productReviewsCreate
      tags: [Products]
      summary: Submit a review for a product (multipart)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                title: { type: string }
                quality_rating: { type: number }
                value_rating: { type: number }
                price_rating: { type: number }
                image: { type: string, format: binary }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reviews: { type: array, items: { type: object } }
        '400': { $ref: '#/components/responses/400ValidationError' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500Internal' }

  /products/{id}/reviews/me:
    get:
      operationId: productReviewsMine
      tags: [Products]
      summary: Current user's review on a product
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          productId: { type: string }
                          total: { type: integer }
                          reviews: { type: array, items: { type: object } }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500Internal' }

  /products/{id}/similar:
    get:
      operationId: productsGetSimilar
      tags: [Products]
      summary: Get similar products
      description: Returns products similar to the specified product. ID is now a URL segment. Public.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID.
        - in: query
          name: product_type_id
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Similar product list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Product'
        '500':
          $ref: '#/components/responses/500Internal'

  /shipping/countries:
    get:
      operationId: shippingCountries
      tags: [Shipping]
      summary: List active shipping countries
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          countries: { type: array, items: { type: object } }
        '500': { $ref: '#/components/responses/500Internal' }

  /shipping/countries/{code}/cities:
    get:
      operationId: shippingCities
      tags: [Shipping]
      summary: List cities for a shipping country
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          country: { type: string }
                          cities: { type: array, items: { type: object } }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500Internal' }

  /shipping/quote:
    get:
      operationId: shippingQuote
      tags: [Shipping]
      summary: Calculate shipping quote for an order
      parameters:
        - in: query
          name: country
          schema: { type: string }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: area
          schema: { type: string }
        - in: query
          name: subtotal
          schema: { type: number }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cost: { type: number }
                          currency: { type: string }
                          currencySymbol: { type: string }
                          countryName: { type: string }
                          freeShipping: { type: boolean }
                          freeShippingThreshold: { type: number }
        '400': { $ref: '#/components/responses/400ValidationError' }
        '500': { $ref: '#/components/responses/500Internal' }

  /config:
    get:
      operationId: mobileConfig
      tags: [MobileConfig]
      summary: Mobile app startup config (min version + payment methods)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          minSupportedVersion: { type: string }
                          bannersEnabled:
                            type: boolean
                            description: |
                              Home-screen banner carousel kill-switch. Mobile
                              reads this via `AppVersionGate.remoteBannersEnabled`
                              (see Bazaar-Mobile-App/lib/core/services/
                              app_version_gate.dart). Defaults to true; flip to
                              false to hide the home carousel without an app
                              release. Toggled via PUT /v2/admin/payment-method-config.
                        required: [minSupportedVersion, bannersEnabled]
                        description: |
                          Minimal app-startup bootstrap. Payment-provider
                          availability is served by `GET /v2/payment-methods`
                          (rich shape per provider). Earlier versions of this
                          endpoint also returned `nomodEnabled` and a
                          `paymentMethods` string array — both removed because
                          they duplicated `/v2/payment-methods`.
        '500': { $ref: '#/components/responses/500Internal' }

# ─────────────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────
# Banners
# ─────────────────────────────────────────────────────────────────────────────

  /banners:
    get:
      operationId: bannersGet
      tags: [Banners]
      summary: Get all banners
      description: |
        Returns all banner images, sorted by most recently created first.
        Public endpoint — no authentication required.
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Banners fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          banners:
                            type: array
                            items:
                              type: object
                              properties:
                                _id:
                                  type: string
                                  description: MongoDB document id.
                                name:
                                  type: string
                                  description: Banner display name.
                                image:
                                  type: string
                                  format: uri
                                  description: Fully-qualified URL to the banner image.
                                createdAt:
                                  type: string
                                  format: date-time
                                updatedAt:
                                  type: string
                                  format: date-time
        '500':
          $ref: '#/components/responses/500Internal'

# ─────────────────────────────────────────────────────────────────────────────
# Verticals
# ─────────────────────────────────────────────────────────────────────────────

  /verticals:
    get:
      operationId: verticalsList
      tags: [Verticals]
      summary: List all verticals
      description: |
        Returns the full verticals list (UAE first, then coming-soon entries).
        Response is cached for 5 minutes.
        Public — no authentication required.
      parameters:
        - $ref: '#/components/parameters/XClient'
      responses:
        '200':
          description: Verticals fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          verticals:
                            type: array
                            items:
                              type: object
                              required: [id, label, enabled, comingSoon]
                              properties:
                                id:
                                  type: string
                                  example: uae
                                label:
                                  type: string
                                  example: UAE
                                tag:
                                  type: string
                                  nullable: true
                                  example: Default
                                enabled:
                                  type: boolean
                                comingSoon:
                                  type: boolean
                                launchDate:
                                  type: string
                                  format: date-time
                                  nullable: true
        '500':
          $ref: '#/components/responses/500Internal'

  # /notify-me renamed to POST /notifications/subscriptions in Wave 3 (see above)

  /admin/payment-method-config:
    get:
      operationId: adminGetPaymentMethodConfig
      tags: [Admin]
      summary: Get payment method runtime config
      description: |
        Returns the singleton `paymentMethodConfig` document.
        Auto-creates it with defaults (`stripeEnabled: true`, `tabbyEnabled: true`,
        `nomodEnabled: false`) if it does not yet exist.

        > **Admin bearer token required** — the `Authorization` header must carry
        > a JWT issued for an admin account, not a regular user token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current payment-method config.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentMethodConfig'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'
    put:
      operationId: adminUpdatePaymentMethodConfig
      tags: [Admin]
      summary: Toggle payment methods on/off at runtime
      description: |
        Partial update — only the fields present in the request body are applied.
        Each field must be a strict JSON boolean (`true` / `false`); strings and
        numbers are rejected with `400 VALIDATION_ERROR`.

        Flips take effect immediately: the Redis cache for payment-method config
        (TTL 30 s) is invalidated on every successful PUT.

        > **Admin bearer token required** — the `Authorization` header must carry
        > a JWT issued for an admin account, not a regular user token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stripeEnabled:
                  type: boolean
                  description: Enable/disable Stripe (card) payments.
                tabbyEnabled:
                  type: boolean
                  description: Enable/disable Tabby buy-now-pay-later.
                nomodEnabled:
                  type: boolean
                  description: Enable/disable Nomod payments.
                bannersEnabled:
                  type: boolean
                  description: |
                    Home-screen banner carousel kill-switch (mobile). Default
                    true. Flip to false to hide the home carousel without an
                    app release.
              minProperties: 1
            example:
              stripeEnabled: true
              tabbyEnabled: false
      responses:
        '200':
          description: Updated config doc.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentMethodConfig'
        '400':
          $ref: '#/components/responses/400ValidationError'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '500':
          $ref: '#/components/responses/500Internal'

# Reusable Parameters
# ─────────────────────────────────────────────────────────────────────────────
  parameters:

    XClient:
      in: header
      name: X-Client
      required: true
      schema:
        type: string
        enum: [web, mobile]
      description: >
        Platform identifier. Routes behave differently per platform.
        Missing or invalid value → 400 `UNKNOWN_PLATFORM`.

    XClientMobile:
      in: header
      name: X-Client
      required: true
      schema:
        type: string
        enum: [mobile]
      description: This endpoint is **mobile-only**. Must be `mobile`.

    XClientWeb:
      in: header
      name: X-Client
      required: true
      schema:
        type: string
        enum: [web]
      description: This endpoint is **web-only**. Must be `web`.

    AddressId:
      in: path
      name: addressId
      required: true
      schema:
        type: string
      description: MongoDB ObjectId of the address document.
