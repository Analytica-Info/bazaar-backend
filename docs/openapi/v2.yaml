        '500':
          $ref: '#/components/responses/500Internal'

  /me/reviews:
    get:
      operationId: meGetReviews
      tags: [User]
      summary: List the current user's reviews
      description: Available on **both** mobile and web clients.
      security:
        - bearerAuth: []
        - cookieAuth: []
