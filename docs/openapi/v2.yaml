openapi: 3.1.0

info:
  title: Bazaar v2 API
  version: 2.0.0
  description: |
    Unified BFF API for the Bazaar platform.  All endpoints live under `/v2/*`.

    **Platform routing** — every request must carry an `X-Client` header:
    - `mobile` — Flutter app (bearer tokens).
    - `web` — Next.js storefront (cookies preferred).

    Endpoints marked **mobile-only** or **web-only** return `400 UNKNOWN_PLATFORM`
    when called from the wrong client.  Endpoints under the **Shared** group
    (Products, Wishlist) are served to both clients.

    **Response envelope** — every response, success or error, is wrapped:

    ```json
    { "success": true, "data": { … } }
    { "success": false, "error": { "code": "TOKEN_EXPIRED", "message": "…" } }
    ```

    Paginated responses add a `meta` key alongside `data`.

    **Auth** — two complementary schemes:
    - `bearerAuth` — `Authorization: Bearer <access-jwt>` (mobile default, web fallback).
    - `cookieAuth` — `bz_at` HttpOnly cookie (web default).

    The app accepts either; prefer what matches `tokenDelivery` at login.

    **Error codes** — machine-readable codes in `error.code`.  Full catalog:
    `docs/v2-auth/ERROR-CATALOG.md`.
  contact:
    name: Bazaar Platform Team
    email: platform@bazaar-uae.com
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: "${BACKEND_URL}/v2"
    description: Production (set BACKEND_URL in .env)
  - url: "${STAGING_URL}/v2"
    description: Staging (set STAGING_URL in .env)
  - url: "http://localhost:${PORT}/v2"
    description: Local development (default PORT=5000)

# ─────────────────────────────────────────────────────────────────────────────
# Tags
# ─────────────────────────────────────────────────────────────────────────────
tags:
  - name: Auth
    description: |
      Authentication and session management.
      Mobile-only routes: `/auth/refresh-token`, `/auth/check-access-token`, `/auth/recovery-account` (mobile variant).
      Web-only routes: `/auth/logout`, `/auth/check`.
      Shared auth routes served to both clients: register, login, google-login, apple-login,
      forgot-password, verify-code, reset-password, update-password, update-profile,
      user-data, delete-account, resend-recovery-code.
  - name: Cart
    description: Shopping cart — add, remove, adjust quantity.
  - name: Orders
    description: Checkout flows (Stripe, Tabby, Nomod), address book, order history, payment methods.
  - name: Products
    description: Product catalogue, search, categories. Available to all clients without auth.
  - name: User
    description: Authenticated user profile, order history, payment history, reviews, dashboard.
  - name: Wishlist
    description: Save and remove products from the wishlist.
  - name: Notifications
    description: In-app notification inbox — list, mark-read, track-click.
  - name: Coupons
    description: Coupon and promo code listing and validation. Available to anonymous and authenticated callers.
  - name: Rails
    description: Paginated smart-category rail endpoint. Single parameterised route replacing the 9 legacy per-rail routes.
  - name: Banners
    description: Public banner image listing. Read-only, no auth required.
  - name: Verticals
    description: Vertical discovery and coming-soon launch subscriptions.
  - name: Admin
    description: |
      Internal admin-only operations.  All routes require an **admin** Bearer token
      (verified against the `Admin` collection — not a regular user token).
      The `X-Client` platform header is **not** required for admin routes.

# ─────────────────────────────────────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Access JWT obtained from `/v2/auth/login` (or OAuth login) with
        `tokenDelivery: "bearer"`.  Pass as `Authorization: Bearer <token>`.
    cookieAuth:
      type: apiKey
      in: cookie
      name: bz_at
      description: >
        HttpOnly access-token cookie set by the server when
        `tokenDelivery: "cookie"` is used.  Web clients use this by default.

# ─────────────────────────────────────────────────────────────────────────────
# Reusable Schemas
# ─────────────────────────────────────────────────────────────────────────────
  schemas:

    # ── Admin ─────────────────────────────────────────────────────────────────

    PaymentMethodConfig:
      type: object
      properties:
        _id:
          type: string
          example: singleton
        stripeEnabled:
          type: boolean
        tabbyEnabled:
          type: boolean
        nomodEnabled:
          type: boolean
        bannersEnabled:
          type: boolean
          description: Home-screen banner carousel kill-switch. Default true (fail-open).
        updatedAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          example: system

    # ── Home manifest ────────────────────────────────────────────────────────

    HomeRail:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ok, empty, error]
        data:
          nullable: true
        version:
          type: string
          nullable: true
        ttl:
          type: integer

    HomeManifest:
      type: object
      properties:
        version:
          type: integer
        platform:
          type: string
        generatedAt:
          type: string
          format: date-time
        rails:
          type: array
          items:
            $ref: '#/components/schemas/HomeRail'

    HomeManifestResponse:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HomeManifest'

    # ── Envelope ────────────────────────────────────────────────────────────

    Envelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        data:
          description: Payload. Present on success; null or absent on error.
        error:
          $ref: '#/components/schemas/ErrorBody'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: TOKEN_EXPIRED
          description: >
            Machine-readable stable identifier. Clients switch on this value.
            Full catalog in `docs/v2-auth/ERROR-CATALOG.md`.
        message:
          type: string
          example: Token expired.
          description: Human-readable English message. Do not parse; use `code`.
        details:
          description: Optional extra context — validation field errors, etc.
          nullable: true

    PaginationMeta:
      type: object
      required: [total, page, limit, pages]
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        pages:
          type: integer
          example: 3

    # ── User / Session ───────────────────────────────────────────────────────

    User:
      type: object
      required: [_id, email, name]
      properties:
        _id:
          type: string
          example: "64a1f2b3c4d5e6f7a8b9c0d1"
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: Jane Doe
        phone:
          type: string
          nullable: true
          example: "+971501234567"
        role:
          type: string
          example: user
        avatar:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        emailVerified:
          type: boolean
          nullable: true
        scope:
          type: string
          nullable: true
          example: "user"

    TokenPair:
      type: object
      description: JWT access + refresh token pair. Nulls in cookie mode.
      properties:
        accessToken:
          type: string
          nullable: true
          example: eyJhbGciOiJSUzI1NiJ9...
        refreshToken:
          type: string
          nullable: true
          example: eyJhbGciOiJSUzI1NiJ9...
        expiresIn:
          type: integer
          description: Access token TTL in seconds from now.
          example: 900
        refreshExpiresIn:
          type: integer
          description: Refresh token TTL in seconds from now.
          example: 2592000
        tokenType:
          type: string
          example: Bearer
        csrfToken:
          type: string
          nullable: true
          description: Set in cookie mode; null in bearer mode.

    AuthSuccess:
      allOf:
        - $ref: '#/components/schemas/TokenPair'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            status:
              type: string
              enum: [ok]
              example: ok

    MfaChallenge:
      type: object
      required: [status, challengeToken, expiresIn]
      properties:
        status:
          type: string
          enum: [mfa_required]
        challengeToken:
          type: string
        expiresIn:
          type: integer
          example: 300
        mfaMethods:
          type: array
          items:
            type: string
          example: ["totp"]

    # ── Cart ─────────────────────────────────────────────────────────────────

    CartItem:
      type: object
      properties:
        product_id:
          type: string
        qty:
          type: integer
          minimum: 1
        price:
          type: number
          format: float
        name:
          type: string
        image:
          type: string
          nullable: true

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          format: float
          example: 149.95
        itemCount:
          type: integer
          example: 3

    # ── Order ────────────────────────────────────────────────────────────────

    Address:
      type: object
      required: [fullName, phone, addressLine1, city, country]
      properties:
        _id:
          type: string
        fullName:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
        city:
          type: string
        country:
          type: string
        isPrimary:
          type: boolean
          default: false
        postalCode:
          type: string
          nullable: true

    OrderItem:
      type: object
      properties:
        product_id:
          type: string
        name:
          type: string
        qty:
          type: integer
        price:
          type: number
          format: float
        image:
          type: string
          nullable: true

    Order:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
          example: processing
        total:
          type: number
          format: float
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        address:
          $ref: '#/components/schemas/Address'
        createdAt:
          type: string
          format: date-time
        paymentMethod:
          type: string
          nullable: true

    PaymentRecord:
      type: object
      properties:
        _id:
          type: string
        orderId:
          type: string
        amount:
          type: number
          format: float
        currency:
          type: string
          example: AED
        status:
          type: string
          example: paid
        provider:
          type: string
          example: stripe
        createdAt:
          type: string
          format: date-time

    InventoryValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        unavailableItems:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
              requested:
                type: integer
              available:
                type: integer

    CheckoutSession:
      type: object
      properties:
        sessionId:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
          description: Redirect URL for hosted checkout (Tabby, Nomod).
        clientSecret:
          type: string
          nullable: true
          description: Stripe PaymentIntent client secret.

    # ── Product ──────────────────────────────────────────────────────────────

    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        image:
          type: string
          nullable: true
        subCategories:
          type: array
          items:
            type: object

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        price:
          type: number
          format: float
        salePrice:
          type: number
          format: float
          nullable: true
        images:
          type: array
          items:
            type: string
        category:
          type: string
        subCategory:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        inStock:
          type: boolean
        rating:
          type: number
          format: float
          nullable: true
        reviewCount:
          type: integer
          nullable: true
        inWishlist:
          type: boolean
          nullable: true
          description: Only present when the request carries a valid access token.

    # ── Wishlist ─────────────────────────────────────────────────────────────

    Wishlist:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer

    # ── Notification ─────────────────────────────────────────────────────────

    Notification:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        body:
          type: string
        imageUrl:
          type: string
          nullable: true
        read:
          type: boolean
          default: false
        clickedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Dashboard / Review ────────────────────────────────────────────────────

    Dashboard:
      type: object
      properties:
        totalOrders:
          type: integer
        totalSpent:
          type: number
          format: float
        pendingOrders:
          type: integer
        deliveredOrders:
          type: integer

    Review:
      type: object
      properties:
        _id:
          type: string
        productId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Request bodies ────────────────────────────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, password, name, tokenDelivery]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 80
        phone:
          type: string
          nullable: true
        tokenDelivery:
          type: string
          enum: [cookie, bearer]

    LoginRequest:
      type: object
      required: [email, password, tokenDelivery]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        tokenDelivery:
          type: string
          enum: [cookie, bearer]
        deviceId:
          type: string
          nullable: true

    OAuthLoginRequest:
      type: object
      required: [idToken, tokenDelivery]
      properties:
        idToken:
          type: string
          description: Provider-issued id-token JWT.
        tokenDelivery:
          type: string
          enum: [cookie, bearer]
        deviceId:
          type: string
          nullable: true

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
          description: Required in bearer mode; omit in cookie mode.

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

    ResetPasswordRequest:
      type: object
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
          minLength: 12
          maxLength: 128

    UpdatePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 12
          maxLength: 128

    RecoveryAccountRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string

    ResendRecoveryRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    CheckAccessTokenRequest:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string

    CartItemRequest:
      type: object
      required: [product_id, qty]
      properties:
        product_id:
          type: string
        qty:
          type: integer
          minimum: 1

    CartQtyRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string

    WishlistRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string

    AddressRequest:
      type: object
      required: [fullName, phone, addressLine1, city, country]
      properties:
        fullName:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
        city:
          type: string
        country:
          type: string
        postalCode:
          type: string
          nullable: true
        isPrimary:
          type: boolean
          default: false

    InventoryValidationRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRequest'

    CheckoutStripeRequest:
      type: object
      required: [addressId, items]
      properties:
        addressId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRequest'
        couponCode:
          type: string
          nullable: true

    CheckoutTabbyRequest:
      type: object
      required: [addressId, items]
      properties:
        addressId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRequest'
        couponCode:
          type: string
          nullable: true

    CheckoutNomodRequest:
      type: object
      required: [addressId, items]
      properties:
        addressId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRequest'

    StripeInitRequest:
      type: object
      required: [addressId, items]
      properties:
        addressId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemRequest'
        couponCode:
          type: string
          nullable: true

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: delivered
        note:
          type: string
          nullable: true

    ProductSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        filters:
          type: object
          nullable: true
        page:
          type: integer
          default: 1
        limit:
          type: integer
          default: 20

    MarkNotificationsReadRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
          description: Notification IDs to mark as read. Empty marks all.

    TrackClickRequest:
      type: object
      required: [notificationId]
      properties:
        notificationId:
          type: string

    AddReviewRequest:
      type: object
      required: [productId, rating]
      properties:
        productId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true

# ─────────────────────────────────────────────────────────────────────────────
# Reusable Responses
# ─────────────────────────────────────────────────────────────────────────────
  responses:
    400BadRequest:
      description: Bad request — missing or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: BAD_REQUEST
              message: X-Client header required. Valid values web, mobile.

    401Unauthorized:
      description: Authentication required or token invalid/expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: TOKEN_EXPIRED
              message: Token expired.

    403Forbidden:
      description: Authenticated but not authorised for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: AUTH_SCOPE_INSUFFICIENT
              message: "You don't have permission to do that."

    404NotFound:
      description: Requested resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found.

    409Conflict:
      description: Conflict — e.g. email already registered.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: OAUTH_EMAIL_CONFLICT
              message: An account with this email already exists.

    422Unprocessable:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: VALIDATION_REQUIRED_FIELD
              message: "Missing required field: email."
              details:
                field: email

    429RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate-limit window resets.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: RATE_LIMITED_LOGIN
              message: Too many sign-in attempts. Try again later.

    500Internal:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Envelope'
          example:
            success: false
            error:
              code: INTERNAL_ERROR
              message: Something went wrong. Please try again.

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ════════════════════════════════════════════════════════════════════════════
  # Auth — both platforms unless noted
  # ════════════════════════════════════════════════════════════════════════════

  /auth/register:
    post:
      operationId: authRegister
      tags: [Auth]
      summary: Register a new account
      description: |
        Creates a new user account and returns a token pair.
        Available on **both** mobile and web clients.
        Rate limit: 5 requests / IP / hour.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthSuccess'
        '409':
          $ref: '#/components/responses/409Conflict'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '429':
          $ref: '#/components/responses/429RateLimited'
        '500':
          $ref: '#/components/responses/500Internal'

  /auth/login:
    post:
      operationId: authLogin
      tags: [Auth]
      summary: Email + password login
      description: |
        Authenticates with email and password.  Returns a token pair (status `ok`)
        or an MFA challenge (status `mfa_required`).
        Available on **both** mobile and web clients.
        Rate limit: 10 / account / 15 min.
      security: []
      parameters:
        - $ref: '#/components/parameters/XClient'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful or MFA challenge issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: '#/components/schemas/AuthSuccess'
                          - $ref: '#/components/schemas/MfaChallenge'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          $ref: '#/components/responses/422Unprocessable'
        '423':
          description: Account locked after too many failed attempts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Envelope'
        '429':
